name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --dev --python 3.13
      - run: uv run ruff check src tests scripts
      - run: uv run python scripts/check_file_lines.py
      - name: Install TeX Live (for integration tests)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y texlive-luatex texlive-lang-arabic texlive-fonts-recommended biber
      - run: uv run pytest tests/unit tests/integration --cov=src --cov-fail-under=85
